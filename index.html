<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Special Wish ❤️</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Floating Hearts -->
    <div id="hearts-container"></div>

    <!-- Falling Roses -->
    <div id="roses-container"></div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="music/music.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Card -->
    <div class="card">

        <h1 class="title">
            A Special Wish ❤️
        </h1>

        <p class="subtitle">
            I have something beautiful to tell you...
        </p>

        <!-- Image -->
        <div class="image-box">

            <img src="images/rose.jpg" alt="Special">

        </div>

        <p class="description">

            Every beautiful story begins with a single moment.

            Today, I want to share something that comes straight from my heart.

        </p>

        <button id="openBtn">

            Open My Letter 💌

        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
